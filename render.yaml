services:
  - type: web
    name: ai-travel-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: OPENTRIPMAP_API_KEY
        sync: false
