<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="hero">
      <div class="hero-inner">
        <div class="logo">&#9992; AI Travel Agent</div>
        <p class="tagline">Describe your dream trip. We'll plan every detail.</p>
      </div>
    </header>

    <main class="container">
      <!-- Input -->
      <section class="input-card">
        <textarea id="prompt" rows="3" placeholder="Where do you want to go? Tell us about your ideal trip..."></textarea>
        <div class="input-footer">
          <div class="suggestions">
            <span class="suggestion-label">Try:</span>
            <button class="chip" data-prompt="4 days in Paris in June, budget $1500, flying from New York. I love museums and good food.">Paris trip</button>
            <button class="chip" data-prompt="A week in London in September, moderate budget around $2000. I'm interested in history and pubs.">London week</button>
            <button class="chip" data-prompt="Romantic getaway to Berlin for 3 days, budget $1000 flying from Paris. We like art and nightlife.">Berlin romantic</button>
          </div>
          <button id="run-btn" class="run-btn">
            <span class="btn-text">Plan My Trip</span>
            <span class="btn-spinner hidden"></span>
          </button>
        </div>
      </section>

      <!-- Loading -->
      <section id="loading" class="loading-section hidden">
        <div class="loading-card">
          <div class="spinner-large"></div>
          <h3>Planning your trip...</h3>
          <p class="loading-sub">Searching flights, hotels, weather & attractions. This takes 1-3 minutes.</p>
          <div class="loading-steps" id="loading-steps"></div>
        </div>
      </section>

      <!-- Error -->
      <section id="error-section" class="error-section hidden">
        <div class="error-card">
          <div class="error-icon">!</div>
          <h3>Something went wrong</h3>
          <p id="error-message"></p>
        </div>
      </section>

      <!-- Response: Trip Packages -->
      <section id="packages-section" class="packages-section hidden">
        <h2 class="section-title">Your Trip Packages</h2>
        <div id="packages-container"></div>
      </section>

      <!-- Response: Text (for clarification questions, etc.) -->
      <section id="text-response-section" class="text-response-section hidden">
        <div class="text-response-card">
          <h3>Agent Response</h3>
          <div id="text-response-content"></div>
        </div>
      </section>

      <!-- Execution Trace -->
      <section id="steps-section" class="steps-section hidden">
        <button id="toggle-steps" class="toggle-steps-btn">
          Show Execution Trace (<span id="step-count">0</span> steps)
        </button>
        <div id="steps-container" class="steps-container hidden"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>Technion CS Course Project &bull; Ofek Fuchs &amp; Omri Lazover</p>
    </footer>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
