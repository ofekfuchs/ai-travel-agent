<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Agent</title>
  <link rel="stylesheet" href="/static/style.css?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-brand">
        <div class="header-logo">✈</div>
        <div>
          <span class="header-title">AI Travel Agent</span>
          <span class="header-sub">Powered by ReAct reasoning</span>
        </div>
      </div>
      <button id="new-trip-btn" class="new-trip-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Trip
      </button>
    </header>

    <main class="chat-area" id="chat-area"></main>

    <div class="input-bar">
      <div class="input-bar-inner">
        <textarea id="prompt" rows="1" placeholder="Where do you want to go? Tell me everything..."></textarea>
        <button id="send-btn" class="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line · <span class="credit">Technion CS · Ofek Fuchs & Omri Lazover</span></div>
    </div>
  </div>

  <script src="/static/script.js?v=5"></script>
</body>
</html>
