<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Agent</title>
  <link rel="stylesheet" href="/static/style.css?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-brand">
        <span class="header-icon">&#9992;</span>
        <span class="header-title">AI Travel Agent</span>
      </div>
      <button id="new-trip-btn" class="new-trip-btn">+ New Trip</button>
    </header>

    <main class="chat-area" id="chat-area"></main>

    <div class="input-bar">
      <div class="input-bar-inner">
        <textarea id="prompt" rows="1" placeholder="Describe your dream trip..."></textarea>
        <button id="send-btn" class="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send &middot; Shift+Enter for new line &middot; <span class="credit">Technion CS &middot; Ofek Fuchs &amp; Omri Lazover</span></div>
    </div>
  </div>

  <script src="/static/script.js?v=3"></script>
</body>
</html>
